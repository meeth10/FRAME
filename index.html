<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRAME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:      #E9E2D4;
  --surface: #F1EAD8;
  --cement:  #C2BBB1;
  --cement2: #8F887F;
  --brown:   #6A4830;
  --brown-b: rgba(106,72,48,0.1);
  --ink:     #1C1810;
  --ink2:    #48413A;
  --ink3:    #8A837A;
  --orange:  #E55A00;
  --orange-d:#BF4900;
  --white:   #FDFAF3;
  --r:       2px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Lora',Georgia,serif;min-height:100vh;overflow-x:hidden}
#grain{position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:.03}

/* ─── HEADER ─────────────────── */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem 2rem;
  background:rgba(233,226,212,.9);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--cement);
}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.35rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);user-select:none}
.logo span{color:var(--orange)}
.h-mid{display:flex;align-items:center;gap:1rem;font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:.1em;color:var(--ink3)}
#live-clock{font-weight:700;color:var(--cement2)}
.sync{display:flex;align-items:center;gap:.38rem;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--cement);transition:background .3s;flex-shrink:0}
.sdot.active{background:var(--orange);animation:pulse 1s ease infinite}
.sdot.ok{background:#6BAA6B}.sdot.err{background:#CC4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.h-right{display:flex;align-items:center;gap:.8rem}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--cement2);transition:color .15s;line-height:1;display:flex;align-items:center}
.icon-btn:hover{color:var(--ink)}
.icon-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.btn-new{background:var(--ink);color:var(--white);border:none;border-radius:var(--r);padding:.48rem .95rem;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.07em;text-transform:uppercase;transition:background .15s}
.btn-new:hover{background:var(--brown)}

/* ─── SETTINGS DRAWER ─────────────────── */
#drawer{position:fixed;top:0;right:0;bottom:0;z-index:300;width:300px;background:var(--surface);border-left:1px solid var(--cement);transform:translateX(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;overflow-y:auto}
#drawer.open{transform:translateX(0)}
.dr-head{padding:1.1rem 1.4rem;border-bottom:1px solid var(--cement);border-top:3px solid var(--brown);display:flex;align-items:center;justify-content:space-between}
.dr-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2)}
.dr-body{padding:1.4rem}
.field{margin-bottom:1.15rem}
.flbl{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--cement2);margin-bottom:.32rem}
.finput{
  width:100%;border:1px solid var(--cement);border-radius:var(--r);
  padding:.6rem .75rem;font-family:'Barlow Condensed',sans-serif;
  font-size:.95rem;color:var(--ink);background:var(--white);
  outline:none;transition:border-color .15s;
  /* prevent password manager */
  autocomplete:off;
}
.finput:focus{border-color:var(--orange)}
.fhint{font-size:.68rem;color:var(--ink3);margin-top:.3rem;font-style:italic}
.fhint a{color:var(--orange)}
.btn-save{width:100%;padding:.75rem;margin-top:.4rem;background:var(--orange);color:#fff;border:none;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .15s}
.btn-save:hover{background:var(--orange-d)}
.btn-disc{width:100%;padding:.55rem;margin-top:.65rem;background:none;color:var(--cement2);border:1px solid var(--cement);border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:color .15s,border-color .15s;display:none}
.btn-disc:hover{color:var(--ink);border-color:var(--ink)}
.dr-err{display:none;margin-top:.7rem;padding:.55rem .7rem;background:#FFF0E8;border:1px solid #FFD0B0;border-radius:var(--r);font-size:.75rem;color:#CC4400}
.drawer-back{position:fixed;inset:0;z-index:299;display:none}
.drawer-back.open{display:block}

/* ─── WALL ─────────────────── */
#wall{padding:4.8rem 1.8rem 5rem;max-width:1300px;margin:0 auto}
.wall-meta{margin-bottom:1.8rem;display:flex;align-items:center;gap:1.25rem;font-family:'Barlow Condensed',sans-serif;font-weight:400;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cement2)}
.wall-meta b{color:var(--orange);font-weight:700}
.meta-dot{color:var(--cement)}

.grid{column-count:3;column-gap:.9rem}
@media(max-width:820px){.grid{column-count:2}}
@media(max-width:500px){.grid{column-count:1}#wall{padding:4.5rem 1rem 4rem}header{padding:.8rem 1rem}.h-mid{display:none}}

/* ─── CARD BASE ─────────────────── */
.card{
  break-inside:avoid;position:relative;
  margin-bottom:.9rem;overflow:hidden;
  border-left:2px solid transparent;
  border-radius:var(--r);
  transition:border-left-color .2s,box-shadow .2s,transform .2s;
  animation:up .35s ease both;
}
.card:hover{border-left-color:var(--orange);transform:translateY(-2px)}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* pin dot */
.card::before{content:'';position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--orange);opacity:0;transition:opacity .2s;z-index:2}
.card:hover::before{opacity:.65}

/* shared footer meta */
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem .75rem}
.card-date{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.56rem;letter-spacing:.13em;text-transform:uppercase;color:var(--brown);opacity:.6}
.meta-right{display:flex;align-items:center;gap:.5rem}
.daypart{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.5rem;letter-spacing:.13em;text-transform:uppercase;color:var(--cement2);background:rgba(194,187,177,.22);padding:1px 5px;border-radius:1px}
.del-btn{background:none;border:none;cursor:pointer;color:var(--cement);font-size:.7rem;opacity:0;transition:opacity .15s,color .15s;padding:1px;line-height:1}
.card:hover .del-btn{opacity:1}
.del-btn:hover{color:#CC3333}

/* ─── PHOTO CARD ─────────────────── */
.c-photo{background:var(--white);border:1px solid var(--brown-b);box-shadow:0 1px 5px rgba(28,24,16,.05)}
.c-photo .photo-wrap{position:relative;overflow:hidden}
.c-photo .photo-img{width:100%;display:block;object-fit:cover;cursor:zoom-in;transition:transform .3s ease}
.c-photo:hover .photo-img{transform:scale(1.01)}
.c-photo .photo-strip{height:2px;background:var(--orange)}
.c-photo .photo-text{padding:.75rem 1rem .2rem;font-size:.88rem;line-height:1.68;color:var(--ink2)}
.c-photo .photo-loading{display:flex;align-items:center;justify-content:center;background:var(--surface)}
.mini-spin{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--cement);border-top-color:var(--orange);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── SHORT TEXT CARD ─────────────────── */
.c-short{box-shadow:0 1px 5px rgba(28,24,16,.05);border:1px solid var(--brown-b)}
.c-short .short-body{padding:1.4rem 1.1rem .2rem;text-align:center}
.c-short .short-text{font-size:1.18rem;line-height:1.48;font-style:italic;font-weight:500;color:var(--ink)}

/* ─── LONG TEXT CARD ─────────────────── */
.c-long{box-shadow:0 1px 5px rgba(28,24,16,.05);border:1px solid var(--brown-b)}
.c-long .long-body{padding:1rem 1.1rem .2rem}
.c-long .long-text{font-size:.93rem;line-height:1.75;color:var(--ink2)}

/* ─── EMPTY ─────────────────── */
.empty{padding:6rem 2rem;text-align:center}
.empty-glyph{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:2.5rem;color:var(--cement);letter-spacing:.1em;margin-bottom:1rem;line-height:1}
.empty-h{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.2rem;color:var(--ink2);margin-bottom:.4rem}
.empty-s{font-size:.83rem;color:var(--ink3);font-style:italic}
.empty-s b{color:var(--orange);font-style:normal;font-family:'Barlow Condensed',sans-serif;font-weight:700}

/* ─── LOADING ─────────────────── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.7rem;height:55vh}
.spinner{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--cement);border-top-color:var(--orange);animation:spin .7s linear infinite}
.loading-wrap span{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}

/* ─── COMPOSE ─────────────────── */
#compose{position:fixed;inset:0;z-index:200;display:none;align-items:flex-end;justify-content:center;padding:1.5rem}
#compose.open{display:flex}
.c-back{position:absolute;inset:0;background:rgba(28,24,16,.15);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.c-panel{position:relative;z-index:1;width:100%;max-width:560px;background:var(--white);border-radius:3px;border-top:3px solid var(--orange);box-shadow:0 8px 40px rgba(28,24,16,.15);padding:1.4rem 1.4rem 1.1rem;animation:pop .24s cubic-bezier(.22,1,.36,1) both}
@keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.c-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.c-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cement2)}
.c-x{background:none;border:none;cursor:pointer;color:var(--cement2);font-size:1rem;line-height:1;transition:color .15s}
.c-x:hover{color:var(--ink)}
.c-imgpre{display:none;margin-bottom:.85rem;position:relative}
.c-imgpre.on{display:block}
.c-imgpre img{width:100%;max-height:200px;object-fit:cover;display:block;border-radius:var(--r)}
.c-imgrm{position:absolute;top:.4rem;right:.4rem;background:rgba(28,24,16,.65);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:.68rem;display:flex;align-items:center;justify-content:center}
.c-ta{width:100%;min-height:95px;border:none;outline:none;resize:none;font-family:'Lora',Georgia,serif;font-size:1rem;line-height:1.75;color:var(--ink);background:transparent;caret-color:var(--orange);margin-bottom:.85rem}
.c-ta::placeholder{color:var(--cement);font-style:italic}
.c-foot{display:flex;align-items:center;justify-content:space-between;padding-top:.75rem;border-top:1px solid var(--bg)}
.c-foot-l{display:flex;align-items:center;gap:.7rem}
.attach-btn{background:none;border:none;cursor:pointer;padding:0;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--cement2);transition:color .15s}
.attach-btn:hover{color:var(--orange)}
.wc{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.05em;color:var(--cement)}
.wc.over{color:#CC3333}
.btn-fix{background:var(--orange);color:#fff;border:none;border-radius:var(--r);padding:.52rem 1.15rem;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;transition:background .15s}
.btn-fix:hover{background:var(--orange-d)}
.btn-fix:disabled{opacity:.32;cursor:not-allowed}
.c-hint{font-family:'Barlow Condensed',sans-serif;font-size:.55rem;letter-spacing:.08em;color:var(--cement);margin-top:.4rem;text-align:right}

/* ─── LIGHTBOX ─────────────────── */
#lb{position:fixed;inset:0;z-index:500;background:rgba(28,24,16,.92);display:none;align-items:center;justify-content:center;padding:2rem;cursor:zoom-out}
#lb.open{display:flex}
#lb img{max-width:100%;max-height:88vh;object-fit:contain;border-radius:var(--r)}

#file-in{display:none}
</style>
</head>
<body>

<!-- grain overlay -->
<svg id="grain" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#n)"/></svg>

<!-- HEADER -->
<header>
  <div class="logo">FRAM<span>E</span></div>
  <div class="h-mid">
    <span id="live-clock">00:00</span>
    <div class="sync">
      <div class="sdot" id="sdot"></div>
      <span id="slbl">—</span>
    </div>
  </div>
  <div class="h-right">
    <button class="icon-btn" id="settings-btn" onclick="toggleDrawer()" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
    <button class="btn-new" onclick="openCompose()">+ Frame</button>
  </div>
</header>

<!-- SETTINGS DRAWER -->
<div class="drawer-back" id="drawer-back" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="dr-head">
    <span class="dr-title">GitHub Sync</span>
    <button class="icon-btn" onclick="closeDrawer()">
      <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="dr-body">
    <div class="field">
      <label class="flbl">Personal Access Token</label>
      <!-- autocomplete="new-password" + data attrs prevent Chrome password manager -->
      <input class="finput" id="f-pat" type="password"
        autocomplete="new-password"
        data-lpignore="true"
        data-form-type="other"
        data-1p-ignore="true"
        placeholder="ghp_...">
      <div class="fhint">Needs <code>repo</code> scope. <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank">Generate →</a></div>
    </div>
    <div class="field">
      <label class="flbl">GitHub Username</label>
      <input class="finput" id="f-owner" type="text"
        autocomplete="off"
        data-lpignore="true"
        data-form-type="other"
        placeholder="yourusername">
    </div>
    <div class="field">
      <label class="flbl">Repository Name</label>
      <input class="finput" id="f-repo" type="text"
        autocomplete="off"
        data-lpignore="true"
        data-form-type="other"
        placeholder="my-frames">
      <div class="fhint">Create an empty repo first (public or private — both work).</div>
    </div>
    <button class="btn-save" onclick="saveSettings()">Connect →</button>
    <button class="btn-disc" id="btn-disc" onclick="disconnect()">Disconnect</button>
    <div class="dr-err" id="dr-err"></div>
  </div>
</div>

<!-- WALL -->
<main id="wall">
  <div class="loading-wrap" id="loading-state">
    <div class="spinner"></div>
    <span>loading frames</span>
  </div>
  <div id="wall-content" style="display:none">
    <div class="wall-meta">
      <span><b id="cnt">0</b> frames</span>
      <span class="meta-dot">·</span>
      <span id="word-total">0 words</span>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty-state" style="display:none">
      <div class="empty-glyph">◻</div>
      <div class="empty-h" id="empty-h">Nothing fixed yet.</div>
      <div class="empty-s" id="empty-s">Press + Frame to mark something.</div>
    </div>
  </div>
</main>

<!-- COMPOSE -->
<div id="compose">
  <div class="c-back" onclick="closeCompose()"></div>
  <div class="c-panel">
    <div class="c-top">
      <span class="c-lbl" id="c-date">—</span>
      <button class="c-x" onclick="closeCompose()">✕</button>
    </div>
    <div class="c-imgpre" id="c-imgpre">
      <img id="c-preview" src="" alt="">
      <button class="c-imgrm" onclick="removeImg()">✕</button>
    </div>
    <textarea class="c-ta" id="c-ta" placeholder="mark something." oninput="onInput()"
      autocomplete="off" spellcheck="true"></textarea>
    <div class="c-foot">
      <div class="c-foot-l">
        <button class="attach-btn" onclick="document.getElementById('file-in').click()">↑ Photo</button>
        <span class="wc" id="wc">0 / 100</span>
      </div>
      <button class="btn-fix" id="btn-fix" onclick="fixFrame()" disabled>Fix</button>
    </div>
    <div class="c-hint">⌘ + Enter to fix</div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb" onclick="this.classList.remove('open')">
  <img id="lb-img" src="" alt="">
</div>

<input type="file" id="file-in" accept="image/*" onchange="onFile(event)">

<script>
const GH = 'https://api.github.com';
let cfg = null, frames = [], sha = null, pendingImg = null;
// image cache: path -> dataURL (avoids re-fetching same image)
const imgCache = new Map();

const PROMPTS = [
  'mark something.',
  'what just happened.',
  'fix this before it fades.',
  'a line. nothing more.',
  'something worth keeping.',
  "the thought you almost didn't have."
];

const HEIGHTS = [180, 220, 260, 300, 240]; // varied photo heights

// ── INIT ─────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  startClock();
  const p = ls('fp'), o = ls('fo'), r = ls('fr');
  if (p && o && r) {
    cfg = { pat: p, owner: o, repo: r };
    fillForm(); boot();
  } else {
    showNoCfg();
  }
});

function ls(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
function lss(k,v) { try { localStorage.setItem(k,v); } catch(e) {} }
function el(id) { return document.getElementById(id); }
function val(id) { return el(id).value.trim(); }

function startClock() {
  const tick = () => {
    el('live-clock').textContent = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  };
  tick(); setInterval(tick, 1000);
}

function fillForm() {
  if (!cfg) return;
  el('f-pat').value = cfg.pat || '';
  el('f-owner').value = cfg.owner || '';
  el('f-repo').value = cfg.repo || '';
  el('btn-disc').style.display = 'block';
}

function showNoCfg() {
  el('loading-state').style.display = 'none';
  el('wall-content').style.display = 'block';
  el('grid').innerHTML = '';
  el('empty-state').style.display = 'block';
  el('empty-h').textContent = 'Nothing fixed yet.';
  el('empty-s').innerHTML = 'Click <b>⚙</b> to connect GitHub and begin.';
  setSyncState('—', '');
}

// ── SETTINGS DRAWER ─────────────────────────────────
function toggleDrawer() {
  el('drawer').classList.contains('open') ? closeDrawer() : openDrawer();
}
function openDrawer() {
  el('drawer').classList.add('open');
  el('drawer-back').classList.add('open');
}
function closeDrawer() {
  el('drawer').classList.remove('open');
  el('drawer-back').classList.remove('open');
}

async function saveSettings() {
  const pat = val('f-pat'), owner = val('f-owner'), repo = val('f-repo');
  const errEl = el('dr-err');
  errEl.style.display = 'none';
  if (!pat || !owner || !repo) {
    errEl.textContent = 'All fields required.';
    errEl.style.display = 'block'; return;
  }
  try {
    const r = await fetch(`${GH}/repos/${owner}/${repo}`, { headers: ghH(pat) });
    if (!r.ok) { const j = await r.json(); throw new Error(j.message); }
  } catch(e) {
    errEl.textContent = `GitHub: ${e.message}`;
    errEl.style.display = 'block'; return;
  }
  lss('fp', pat); lss('fo', owner); lss('fr', repo);
  cfg = { pat, owner, repo };
  el('btn-disc').style.display = 'block';
  imgCache.clear();
  closeDrawer(); boot();
}

function disconnect() {
  if (!confirm('Disconnect? Frames stay safe in the repo.')) return;
  ['fp','fo','fr'].forEach(k => { try { localStorage.removeItem(k); } catch(e) {} });
  cfg = null; frames = []; sha = null; imgCache.clear();
  el('btn-disc').style.display = 'none';
  showNoCfg();
}

// ── GITHUB API ─────────────────────────────────
function ghH(pat) {
  return {
    'Authorization': `token ${pat || cfg.pat}`,
    'Content-Type': 'application/json',
    'User-Agent': 'FRAME-app'
  };
}
async function ghGet(path) {
  const r = await fetch(`${GH}/repos/${cfg.owner}/${cfg.repo}/contents/${path}`, { headers: ghH() });
  if (r.status === 404) return null;
  if (!r.ok) throw new Error('GH ' + r.status);
  return r.json();
}
async function ghPut(path, content, fileSha, msg) {
  const body = { message: msg || path, content };
  if (fileSha) body.sha = fileSha;
  const r = await fetch(`${GH}/repos/${cfg.owner}/${cfg.repo}/contents/${path}`, {
    method: 'PUT', headers: ghH(), body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('Save failed');
  return r.json();
}
async function ghDel(path, fileSha) {
  await fetch(`${GH}/repos/${cfg.owner}/${cfg.repo}/contents/${path}`, {
    method: 'DELETE', headers: ghH(),
    body: JSON.stringify({ message: `del ${path}`, sha: fileSha })
  });
}

// ── IMAGE LOADING (via API, not raw URL) ─────────────────────────────────
// This works for both public AND private repos, and is always up to date.
async function loadImageViaAPI(path) {
  if (imgCache.has(path)) return imgCache.get(path);
  try {
    const f = await ghGet(path);
    if (!f || !f.content) return null;
    // GitHub base64 has newlines — strip them
    const b64 = f.content.replace(/\n/g, '').replace(/\s/g, '');
    // Detect type from path
    const ext = path.split('.').pop().toLowerCase();
    const mime = ext === 'png' ? 'image/png' : ext === 'webp' ? 'image/webp' : 'image/jpeg';
    const url = `data:${mime};base64,${b64}`;
    imgCache.set(path, url);
    return url;
  } catch(e) {
    console.warn('Image load failed:', path, e);
    return null;
  }
}

// Load images for all cards currently on screen
async function hydrateImages() {
  const placeholders = document.querySelectorAll('[data-img-path]');
  const promises = Array.from(placeholders).map(async (ph) => {
    const path = ph.getAttribute('data-img-path');
    if (!path) return;
    const url = await loadImageViaAPI(path);
    if (url) {
      const img = document.createElement('img');
      img.className = 'photo-img';
      img.src = url;
      img.style.height = ph.style.height;
      img.alt = '';
      img.onclick = () => openLB(url);
      ph.replaceWith(img);
    } else {
      ph.innerHTML = '<div style="color:var(--cement2);font-family:\'Barlow Condensed\',sans-serif;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase">Could not load image</div>';
    }
  });
  await Promise.all(promises);
}

// ── BOOT ─────────────────────────────────
async function boot() {
  setSyncState('LOADING', 'active');
  el('loading-state').style.display = 'flex';
  el('wall-content').style.display = 'none';
  try {
    const f = await ghGet('frames.json');
    if (!f) { frames = []; sha = null; }
    else {
      sha = f.sha;
      const raw = decodeURIComponent(escape(atob(f.content.replace(/\n/g,''))));
      frames = JSON.parse(raw).frames || [];
    }
    renderWall();
    setSyncState('SYNCED', 'ok');
    hydrateImages(); // load images in background after render
  } catch(e) {
    setSyncState('ERROR', 'err');
    console.error(e);
  }
}

async function saveFrames() {
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify({ frames }, null, 2))));
  const res = await ghPut('frames.json', b64, sha, `frame ${new Date().toISOString()}`);
  sha = res.content.sha;
}

// ── RENDER ─────────────────────────────────
function renderWall() {
  el('loading-state').style.display = 'none';
  el('wall-content').style.display = 'block';
  const total = frames.reduce((s, f) => s + (f.text ? f.text.trim().split(/\s+/).length : 0), 0);
  el('cnt').textContent = frames.length;
  el('word-total').textContent = total.toLocaleString() + ' words';
  const grid = el('grid');
  if (!frames.length) {
    grid.innerHTML = '';
    el('empty-state').style.display = 'block';
    el('empty-h').textContent = 'Nothing fixed yet.';
    el('empty-s').textContent = 'Press + Frame to mark something.';
    return;
  }
  el('empty-state').style.display = 'none';
  grid.innerHTML = frames.map((f, i) => cardHTML(f, i)).join('');
}

// ── CARD RENDERING ─────────────────────────────────
function pseudoRand(id) {
  let h = 0;
  for (const c of String(id)) h = ((h << 5) - h) + c.charCodeAt(0);
  return Math.abs(h);
}

function dayPart(ts) {
  const h = new Date(ts).getHours();
  if (h < 6) return 'NIGHT';
  if (h < 12) return 'MORNING';
  if (h < 17) return 'AFTERNOON';
  if (h < 21) return 'EVENING';
  return 'NIGHT';
}

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }).toUpperCase()
    + ' · ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

const CARD_TINTS = ['#FDFAF3','#FBF7EE','#FEF9F2','#FAF6EC','#FDFBF5'];

function cardFooterHTML(f) {
  return `<div class="card-footer">
    <span class="card-date">${fmtDate(f.ts)}</span>
    <div class="meta-right">
      <span class="daypart">${dayPart(f.ts)}</span>
      <button class="del-btn" onclick="delFrame('${f.id}')">✕</button>
    </div>
  </div>`;
}

function cardHTML(f, i) {
  const rnd = pseudoRand(f.id);
  const tint = CARD_TINTS[rnd % CARD_TINTS.length];
  const delay = Math.min(i * 28, 280);
  const words = f.text ? f.text.trim().split(/\s+/).length : 0;
  const isShort = words <= 16 && !f.img;

  // PHOTO CARD
  if (f.img) {
    const imgH = HEIGHTS[rnd % HEIGHTS.length];
    const txtHtml = f.text
      ? `<div class="photo-text">${esc(f.text)}</div>`
      : '';
    return `<div class="card c-photo" style="background:${tint};animation-delay:${delay}ms">
      <div class="photo-wrap">
        <!-- placeholder shown until image loads via API -->
        <div class="photo-loading" data-img-path="${f.img}" style="height:${imgH}px">
          <div class="mini-spin"></div>
        </div>
      </div>
      <div class="photo-strip"></div>
      ${txtHtml}
      ${cardFooterHTML(f)}
    </div>`;
  }

  // SHORT / ONELINER CARD
  if (isShort) {
    const sizes = ['1.15rem','1.22rem','1.18rem','1.1rem','1.25rem'];
    const fs = sizes[rnd % sizes.length];
    return `<div class="card c-short" style="background:${tint};animation-delay:${delay}ms">
      <div class="short-body">
        <div class="short-text" style="font-size:${fs}">${esc(f.text)}</div>
      </div>
      ${cardFooterHTML(f)}
    </div>`;
  }

  // LONG TEXT CARD
  return `<div class="card c-long" style="background:${tint};animation-delay:${delay}ms">
    <div class="long-body">
      <div class="long-text">${esc(f.text)}</div>
    </div>
    ${cardFooterHTML(f)}
  </div>`;
}

async function delFrame(id) {
  if (!confirm('Remove this frame?')) return;
  setSyncState('SAVING', 'active');
  const frame = frames.find(f => f.id === id);
  frames = frames.filter(f => f.id !== id);
  try {
    await saveFrames();
    if (frame?.img) {
      imgCache.delete(frame.img);
      const imgF = await ghGet(frame.img);
      if (imgF) await ghDel(frame.img, imgF.sha);
    }
    renderWall();
    setSyncState('SYNCED', 'ok');
    hydrateImages();
  } catch(e) {
    setSyncState('ERROR', 'err');
  }
}

// ── COMPOSE ─────────────────────────────────
function openCompose() {
  const now = new Date();
  el('c-date').textContent = now.toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  }).toUpperCase();
  el('c-ta').placeholder = PROMPTS[Math.floor(Math.random() * PROMPTS.length)];
  el('compose').classList.add('open');
  setTimeout(() => el('c-ta').focus(), 80);
}
function closeCompose() {
  el('compose').classList.remove('open');
  el('c-ta').value = '';
  el('wc').textContent = '0 / 100';
  el('wc').classList.remove('over');
  el('btn-fix').disabled = true;
  removeImg();
}
function onInput() {
  const t = el('c-ta').value;
  const w = t.trim() ? t.trim().split(/\s+/).length : 0;
  el('wc').textContent = `${w} / 100`;
  el('wc').classList.toggle('over', w > 100);
  el('btn-fix').disabled = (!t.trim() && !pendingImg) || w > 100;
}

// ── IMAGE UPLOAD ─────────────────────────────────
function onFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1400, Q = 0.82;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const cvs = document.createElement('canvas');
      cvs.width = w; cvs.height = h;
      cvs.getContext('2d').drawImage(img, 0, 0, w, h);
      const url = cvs.toDataURL('image/jpeg', Q);
      pendingImg = { b64: url.split(',')[1], url, ext: 'jpg' };
      el('c-preview').src = url;
      el('c-imgpre').classList.add('on');
      onInput();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}
function removeImg() {
  pendingImg = null;
  el('c-imgpre').classList.remove('on');
  el('c-preview').src = '';
  onInput();
}

// ── FIX (SAVE) ─────────────────────────────────
async function fixFrame() {
  if (!cfg) { openDrawer(); return; }
  const text = el('c-ta').value.trim();
  if (!text && !pendingImg) return;
  if (text && text.split(/\s+/).length > 100) return;

  setSyncState('SAVING', 'active');
  el('btn-fix').disabled = true;

  try {
    const id = `f${Date.now()}`;
    let imgRef = null;

    if (pendingImg) {
      const path = `images/${id}.jpg`;
      await ghPut(path, pendingImg.b64, null, `img ${id}`);
      imgRef = path;
      // pre-cache the image so it shows immediately
      imgCache.set(path, pendingImg.url);
    }

    frames.unshift({ id, text, img: imgRef, ts: new Date().toISOString() });
    await saveFrames();
    renderWall();
    setSyncState('SYNCED', 'ok');
    closeCompose();
    // hydrate: newly added card with image already in cache, loads instantly
    hydrateImages();
  } catch(e) {
    setSyncState('ERROR', 'err');
    console.error(e);
    el('btn-fix').disabled = false;
  }
}

// ── LIGHTBOX ─────────────────────────────────
function openLB(src) {
  el('lb-img').src = src;
  el('lb').classList.add('open');
}

// ── UTIL ─────────────────────────────────
function esc(s) {
  return s
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}
function setSyncState(label, state) {
  const dot = el('sdot');
  dot.className = 'sdot';
  if (state) dot.classList.add(state);
  el('slbl').textContent = label;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeCompose();
    el('lb').classList.remove('open');
    closeDrawer();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') fixFrame();
});
</script>
